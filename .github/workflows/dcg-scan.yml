# dcg-scan.yml — Scan PR diffs for destructive commands
#
# This workflow runs `dcg scan --git-diff` on pull requests to detect
# dangerous patterns in changed files before they're merged.
#
# USAGE: Copy this file to your project's .github/workflows/ directory.
#
# CONFIGURATION:
#   - Set DCG_FAIL_ON to control exit behavior:
#     - "error" (default): Fail only on error-severity findings
#     - "warning": Fail on warnings and errors
#     - "none": Never fail (informational only)
#
#   - Set DCG_VERSION to pin a specific version:
#     - "latest" (default): Use latest release
#     - "v0.6.8-codexpp.1": Use a specific fork version tag

name: dcg-scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always
  # Fail policy: "error" | "warning" | "none"
  DCG_FAIL_ON: error
  # Version to use: "latest" or a specific tag like "v0.6.8-codexpp.1"
  DCG_VERSION: latest

jobs:
  scan:
    name: Scan for destructive commands
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Fetch enough history for git diff
          fetch-depth: 0

      - name: Download dcg binary
        run: |
          set -euo pipefail

          if [ "$DCG_VERSION" = "latest" ]; then
            if ! VERSION=$(curl -fsSL https://api.github.com/repos/Pimpmuckl/destructive_command_guard/releases/latest | jq -er '.tag_name | select(type == "string" and length > 0)'); then
              echo "::warning::No fork release is published yet; building Pimpmuckl/main for this scan"
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
              source "$HOME/.cargo/env"
              cargo install --locked --git https://github.com/Pimpmuckl/destructive_command_guard --branch main destructive_command_guard
              echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
              exit 0
            fi
          else
            VERSION="$DCG_VERSION"
          fi
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::DCG_VERSION must be 'latest' or a v-prefixed semantic version"
            exit 1
          fi

          ARCHIVE="dcg-x86_64-unknown-linux-musl.tar.xz"
          DOWNLOAD_URL="https://github.com/Pimpmuckl/destructive_command_guard/releases/download/${VERSION}/${ARCHIVE}"
          CHECKSUM_URL="${DOWNLOAD_URL}.sha256"

          WORK_DIR=$(mktemp -d "${RUNNER_TEMP}/dcg-scan.XXXXXX")
          chmod 700 "$WORK_DIR"
          cd "$WORK_DIR"

          if ! curl -fsSL "$DOWNLOAD_URL" -o "$ARCHIVE"; then
            echo "::warning::No pre-built binary found, building from source..."
            # Fallback: build from source
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            source "$HOME/.cargo/env"
            cargo install --locked --git https://github.com/Pimpmuckl/destructive_command_guard --tag "$VERSION" destructive_command_guard
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          else
            curl -fsSL "$CHECKSUM_URL" -o "${ARCHIVE}.sha256"
            EXPECTED_SHA256=$(awk 'NR == 1 { print $1 }' "${ARCHIVE}.sha256")
            if ! [[ "$EXPECTED_SHA256" =~ ^[[:xdigit:]]{64}$ ]]; then
              echo "::error::Release checksum is not a valid SHA-256 value"
              exit 1
            fi

            ACTUAL_SHA256=$(sha256sum "$ARCHIVE" | awk '{ print $1 }')
            ACTUAL_SHA256=$(printf '%s' "$ACTUAL_SHA256" | tr '[:upper:]' '[:lower:]')
            EXPECTED_SHA256=$(printf '%s' "$EXPECTED_SHA256" | tr '[:upper:]' '[:lower:]')
            if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
              echo "::error::SHA-256 verification failed for $ARCHIVE"
              exit 1
            fi

            MEMBERS=$(tar -tJf "$ARCHIVE")
            MEMBER_TYPE=$(tar -tvJf "$ARCHIVE" | cut -c1)
            if [ "$MEMBERS" != "dcg" ] || [ "$MEMBER_TYPE" != "-" ]; then
              echo "::error::$ARCHIVE must contain exactly one root-level regular member named dcg"
              exit 1
            fi
            tar -xOJf "$ARCHIVE" dcg > dcg.extracted
            if [ ! -s dcg.extracted ]; then
              echo "::error::$ARCHIVE contained an empty dcg member"
              exit 1
            fi
            mkdir -p "$HOME/.local/bin"
            install -m 0755 dcg.extracted "$HOME/.local/bin/dcg"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Verify dcg installation
        run: dcg --version

      - name: Determine base commit
        id: base
        run: |
          # Use the merge base between PR branch and target branch
          BASE_SHA=$(git merge-base "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          echo "sha=$BASE_SHA" >> $GITHUB_OUTPUT
          echo "Base commit: $BASE_SHA"

      - name: Run dcg scan on changed files
        id: scan
        run: |
          set +e  # Don't exit on error so we can capture the exit code

          # Build the diff range
          DIFF_RANGE="${{ steps.base.outputs.sha }}...${{ github.event.pull_request.head.sha }}"
          echo "Scanning diff range: $DIFF_RANGE"

          # Run the scan (stdout=JSON, stderr=debug messages)
          dcg scan \
            --git-diff "$DIFF_RANGE" \
            --exclude install.sh \
            --exclude install.ps1 \
            --exclude uninstall.sh \
            --exclude uninstall.ps1 \
            --exclude .github/workflows/dist.yml \
            --exclude tests/install/test_helper.bash \
            --format json \
            --fail-on "$DCG_FAIL_ON" \
            > scan-results.json

          SCAN_EXIT=$?
          echo "exit_code=$SCAN_EXIT" >> $GITHUB_OUTPUT

          # Always output results for debugging
          cat scan-results.json

          # Parse summary for step summary
          if [ -f scan-results.json ] && jq -e '.summary' scan-results.json > /dev/null 2>&1; then
            TOTAL=$(jq '.summary.findings_total // 0' scan-results.json)
            ERRORS=$(jq '.summary.severities.error // 0' scan-results.json)
            WARNINGS=$(jq '.summary.severities.warning // 0' scan-results.json)

            echo "## DCG Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Findings | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Warnings | $WARNINGS |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$SCAN_EXIT" -ne 0 ]; then
              echo "**Status: FAILED** (exit code $SCAN_EXIT)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Review the findings below and fix any destructive patterns before merging." >> $GITHUB_STEP_SUMMARY
            else
              echo "**Status: PASSED**" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## DCG Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No findings or scan output could not be parsed." >> $GITHUB_STEP_SUMMARY
          fi

          exit $SCAN_EXIT

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dcg-scan-results
          path: scan-results.json
          retention-days: 14
          if-no-files-found: ignore

  # Optional: Build from source (for repos that want to build dcg themselves)
  # Uncomment this job and remove the "Download dcg binary" step above
