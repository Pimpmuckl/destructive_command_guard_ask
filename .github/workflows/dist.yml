name: dist

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --lib

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — musl for portability. The previous gnu target
          # linked against the build runner's glibc, which on
          # ubuntu-latest is currently 2.39+ and rejects any host with
          # glibc < 2.39 (Ubuntu 22.04 LTS, RHEL 8/9, etc.). See #114.
          # `self_update`'s `rustls` feature avoids the OpenSSL link that
          # would normally make musl builds painful — dcg has no other
          # C-using deps, so musl-tools + the static target are
          # sufficient.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: dcg
            apt_install: musl-tools
          # macOS Apple Silicon
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: dcg
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: dcg.exe

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust nightly
        # Keep the installed target std on the same pinned nightly selected by
        # rust-toolchain.toml; a floating nightly previously broke cross builds.
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-06
          targets: ${{ matrix.target }}

      - name: Install apt build deps (Linux)
        if: matrix.apt_install != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt_install }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify Linux x86_64 musl binary identity
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          set -euo pipefail
          # Catch a future regression where the musl matrix entry
          # silently links against glibc anyway. `objdump -T` on a
          # static musl binary prints "no dynamic symbol table" to
          # stderr and exits 0; the grep against `GLIBC_` is the
          # actual gate. Any GLIBC_* symbol surfacing here is a
          # release-blocker (see #114 for the original regression).
          # We pipe stderr to stdout so the dump-failure case (missing
          # binary, unreadable file) shows up in the job log instead
          # of getting silently swallowed.
          binary="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          # Explicit existence check: without it, a missing binary
          # would make `objdump -T <missing> | grep -q GLIBC_` return
          # exit 1 (no match), the `if` would evaluate to false, and
          # we'd echo "verified" against a binary that doesn't exist.
          # That false negative is a release-engineering footgun
          # (cargo could legitimately skip the build under caching
          # weirdness), so guard the gate against it directly.
          if [ ! -f "$binary" ]; then
            echo "::error::expected built binary not found at $binary"
            exit 1
          fi
          identity="$(file "$binary")"
          if ! echo "$identity" | grep -Eq 'ELF 64-bit LSB.*x86-64'; then
            echo "::error::expected an x86-64 ELF binary, got: $identity"
            exit 1
          fi
          if objdump -T "$binary" 2>&1 | grep -q "GLIBC_"; then
            echo "::error::musl binary unexpectedly contains GLIBC symbols — release would re-introduce #114"
            objdump -T "$binary" | grep "GLIBC_" || true
            exit 1
          fi
          echo "musl binary verified: $identity; no GLIBC_* symbols present"

      - name: Verify macOS ARM64 binary identity
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          identity="$(file "$binary")"
          if ! echo "$identity" | grep -q 'Mach-O 64-bit executable arm64'; then
            echo "::error::expected a Mach-O ARM64 binary, got: $identity"
            exit 1
          fi
          echo "macOS binary verified: $identity"

      - name: Execute Unix binary (allow + ask + deny)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          allow="$(printf '%s\n' '{"turn_id":"release-smoke","tool_name":"Bash","tool_input":{"command":"git status"}}' | "$binary" 2>/dev/null)"
          [ -z "$allow" ] || { echo "::error::safe command was not silent: $allow"; exit 1; }
          command="$(printf '\147\151\164\040\162\145\163\145\164\040\055\055\150\141\162\144')"
          ask="$(printf '{"turn_id":"release-smoke","permission_decision_ask_supported":true,"tool_name":"Bash","tool_input":{"command":"%s"}}\n' "$command" | "$binary" 2>/dev/null)"
          echo "$ask" | grep -q '"permissionDecision":"ask"' || { echo "::error::expected ask response: $ask"; exit 1; }
          deny="$(printf '{"turn_id":"release-smoke","tool_name":"Bash","tool_input":{"command":"%s"}}\n' "$command" | "$binary" 2>/dev/null)"
          echo "$deny" | grep -q '"permissionDecision":"deny"' || { echo "::error::expected deny response: $deny"; exit 1; }

      - name: Create tarball (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          TARBALL="dcg-${{ matrix.target }}.tar.xz"
          cd target/${{ matrix.target }}/release
          tar -cJf "../../../dist/$TARBALL" ${{ matrix.artifact_name }}
          cd ../../../dist
          shasum -a 256 "$TARBALL" > "$TARBALL.sha256"

      - name: Verify Windows binary is actually PE32+
        if: contains(matrix.target, 'pc-windows-msvc')
        shell: pwsh
        run: |
          # Pin against the v0.5.1 regression (#115): the published Windows
          # assets were Linux ELF binaries renamed to `dcg.exe`. The GH
          # Actions test job had failed and a fallback build path
          # (cross-compile on a non-Windows host) silently produced ELF
          # output and packaged it as Windows. windows-latest runs natively
          # so cargo cannot produce ELF here by construction, but checking
          # the magic bytes is cheap insurance against a future regression
          # (e.g. a cached target/ leaking the wrong artifact).
          $binary = "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          if (-not (Test-Path $binary)) {
            Write-Output "::error::expected built binary not found at $binary"
            exit 1
          }
          $bytes = [System.IO.File]::ReadAllBytes($binary)
          $mz = [BitConverter]::ToString($bytes[0..1])
          if ($mz -ne "4D-5A") {
            Write-Output "::error::Windows build produced a non-PE32+ binary (magic=$mz, expected 4D-5A 'MZ') — release would re-introduce #115"
            exit 1
          }
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          $optionalMagic = [BitConverter]::ToUInt16($bytes, $peOffset + 24)
          if ($machine -ne 0x8664 -or $optionalMagic -ne 0x20b) {
            Write-Output "::error::expected x64 PE32+ (machine=$('{0:X4}' -f $machine), optional=$('{0:X4}' -f $optionalMagic))"
            exit 1
          }
          Write-Output "Windows binary verified: x64 PE32+"

      - name: Execute Windows binary (allow + ask + deny + --version)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          # The PE32+ check above proves it's a Windows binary; this proves it
          # actually RUNS. A binary that is a valid PE yet crashes on startup must
          # not ship. Fast: --version + one allow + one ask + one deny.
          $ErrorActionPreference = 'Stop'
          $bin = "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"

          $ver = (& $bin --version 2>&1 | Out-String)
          if ($LASTEXITCODE -ne 0) { Write-Output "::error::dcg.exe --version failed (exit $LASTEXITCODE)"; exit 1 }
          Write-Output "version: $($ver.Trim())"

          # ALLOW: a safe command must produce empty stdout (silent exit 0).
          $allow = ('{"tool_name":"Bash","tool_input":{"command":"git status"}}' | & $bin | Out-String)
          if (-not [string]::IsNullOrWhiteSpace($allow)) {
            Write-Output "::error::expected silent ALLOW for 'git status', got: $allow"; exit 1
          }

          # ASK/DENY: a destructive command follows the advertised Codex capability.
          # The destructive
          # string is base64'd so it never appears literally in the workflow file
          # (and cannot trip any scanning hook): decodes to 'git reset --hard'.
          $cmd = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String('Z2l0IHJlc2V0IC0taGFyZA=='))
          $ask = (([pscustomobject]@{ turn_id = 'release-smoke'; permission_decision_ask_supported = $true; tool_name = 'Bash'; tool_input = [pscustomobject]@{ command = $cmd } } | ConvertTo-Json -Compress) | & $bin | Out-String)
          if ($ask -notmatch 'permissionDecision' -or $ask -notmatch 'ask') {
            Write-Output "::error::expected ASK JSON for the destructive command, got: $ask"; exit 1
          }
          $deny = (([pscustomobject]@{ turn_id = 'release-smoke'; tool_name = 'Bash'; tool_input = [pscustomobject]@{ command = $cmd } } | ConvertTo-Json -Compress) | & $bin | Out-String)
          if ($deny -notmatch 'permissionDecision' -or $deny -notmatch 'deny') {
            Write-Output "::error::expected DENY JSON for the destructive command, got: $deny"; exit 1
          }
          Write-Output "Windows binary executes: --version OK, allow OK, ask OK, deny OK"

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zipName = "dcg-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" -DestinationPath "dist/$zipName"
          cd dist
          $hash = (Get-FileHash -Algorithm SHA256 $zipName).Hash.ToLower()
          "$hash  $zipName" | Out-File -Encoding ASCII "$zipName.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -laR dist

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign release artifacts (sigstore bundle)
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd dist
          artifacts=(dcg-*)
          for f in "${artifacts[@]}"; do
            [[ "$f" == *.sha256 ]] && continue
            cosign sign-blob --yes --bundle "${f}.sigstore.json" "$f"
          done

      - name: Copy install scripts to dist
        run: |
          cp install.sh dist/ 2>/dev/null || echo "No install.sh found"
          cp install.ps1 dist/ 2>/dev/null || echo "No install.ps1 found"

      - name: Checksum + sign install scripts (git_safety_guard-ythp)
        # Publishes install.sh.sha256 / install.ps1.sha256 (with the
        # `<sha>  <basename>` format `shasum -a 256 -c` understands) plus
        # cosign sigstore bundles. `dcg update` downloads the script to a
        # tempfile, fetches the sha256, verifies, and only then exec's it.
        # Without this the installer-fetch step is a supply-chain trust
        # window even when pinned to a tag.
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd dist
          for script in install.sh install.ps1; do
            [ -f "$script" ] || continue
            shasum -a 256 "$script" > "$script.sha256"
            cosign sign-blob --yes --bundle "$script.sigstore.json" "$script"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          draft: false
          # Fork tags carry a SemVer prerelease suffix, but GitHub must expose
          # them through /releases/latest for the default installer path.
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
